name: Tests

on:
  push:
    branches:
      - main
    paths: 
    - 'src/**'
    - 'Cargo.lock'
    - 'Cargo.toml'
    - 'tests/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2

      - uses: go-task/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tests, Checks and Try Build Docs
        run: task --parallel test:check test:integration doc
