name: Tests

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "tests/**"
      - "build.rs"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
          - os: macos-latest
          - os: windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2

      - uses: go-task/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tests, Checks and Try Build Docs
        run: task --parallel test:check test:integration test:clippy test:fmt doc

  check-msrv:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-msrv
      - run: cargo msrv verify -- cargo check -F build,serde --lib
