name: PR Security Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  label-pr:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
