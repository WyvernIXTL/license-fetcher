name: Benchmark PR

on: [pull_request]

jobs:
  runBenchmark:
    name: Run Bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2
      
      - uses: boa-dev/criterion-compare-action@v3
        with:
          features: "build"
          token: ${{ secrets.GITHUB_TOKEN }}
